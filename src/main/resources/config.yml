settings:
  current-season: "SMP Season 1"
  inactive-season-name: "No Active Season"
  broadcast-new-memory: true
  save-coordinates: true
  enable-book-item: true
  enable-gui: true
  max-book-events: 60
  timeline-page-size: 8
  dragon-assist-radius: 80.0

discord:
  enabled: false
  use-discordsrv: true
  channel: "global"
  send-memory-created: true
  send-season-start: true
  send-season-end: true
  format:
    memory-created: "**📖 Memory Book Updated**\n{icon} **{title}**\n{description}\n👤 Player: `{players}`\n🗓 Season: `{season}`"
    season-start: "**MemoryBook Season Started**\nSeason: `{season}`"
    season-end: "**MemoryBook Season Ended**\nSeason: `{season}`"

rewards:
  enabled: true
  memory-points:
    FIRST_JOIN: 5
    FIRST_NETHER: 10
    FIRST_END: 15
    FIRST_DRAGON_KILL: 40
    FIRST_WITHER_KILL: 25
    FIRST_ELYTRA: 35
    FIRST_WARDEN_DEATH: 10
    FULL_NETHERITE: 20
    LEVEL_100: 20
    SURVIVED_100_DAYS: 20
    CUSTOM: 0

titles:
  FIRST_JOIN: "Founder"
  FIRST_NETHER: "Nether Pioneer"

name: MemoryBook
version: '1.0.0'
main: me.iristrack.memorybook.Main
api-version: '1.20'
author: iris.track28
description: Automatic SMP history, timeline, and written book plugin.
commands:
  timeline:
    description: View the SMP timeline.
    usage: /timeline [page]
    aliases: [tl]
  history:
    description: Open the MemoryBook history GUI.
    usage: /history
  book:
    description: Receive the written Memory Book item.
    usage: /book
  memory:
    description: Admin and player MemoryBook commands.
    usage: /memory <add|remove|list|profile|reload|season>
permissions:
  memorybook.admin:
    description: Allows managing MemoryBook events.
    default: op
  memorybook.use:
    description: Allows using MemoryBook player commands.
    default: true
